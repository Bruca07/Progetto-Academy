<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Utente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .detail-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #1c1e21;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .info-group {
            margin-bottom: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .info-group strong {
            color: #3498db;
            display: block;
            font-size: 12px;
            text-transform: uppercase;
        }

        .info-group p {
            font-size: 18px;
            color: #2c3e50;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #7f8c8d;
            font-weight: bold;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #3498db;
        }
    </style>
</head>
<body>

    <div class="detail-card">
        <h1 id="titoloProfilo">Profilo Utente</h1>
        
        <section id="content">
            <div class="info-group">
                <strong>Nome Completo</strong>
                <p id="nomeUtente">Caricamento...</p>
            </div>
            
            <div class="info-group">
                <strong>Indirizzo Email</strong>
                <p id="emailUtente">Caricamento...</p>
            </div>

            <div class="info-group">
                <strong>Città</strong>
                <p id="cittaUtente">...</p>
            </div>
        </section>

        <a href="index.html" class="back-link">← Torna alla Directory</a>
    </div>

    <script>
        async function loadUserDetail() {
            // 1. Recuperiamo l'ID dall'URL (es: dettaglio.html?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');

            if (!userId) {
                document.getElementById('nomeUtente').innerText = "Nessun ID specificato";
                return;
            }

            try {
                // 2. FETCH dell'utente specifico usando l'URL della traccia
                const response = await fetch(`https://jsonplaceholder.typicode.com/users/${userId}`);
                const user = await response.json();

                // 3. Aggiorniamo l'interfaccia con i dati REALI dell'API
                document.getElementById('nomeUtente').innerText = user.name;
                document.getElementById('emailUtente').innerText = user.email;
                document.getElementById('titoloProfilo').innerText = "Scheda di " + user.name;
                document.getElementById('cittaUtente').innerText = user.address.city;

            } catch (error) {
                console.error("Errore nel recupero dati:", error);
                document.getElementById('nomeUtente').innerText = "Errore nel caricamento";
            }
        }

        window.onload = loadUserDetail;
    </script>
</body>
</html>
